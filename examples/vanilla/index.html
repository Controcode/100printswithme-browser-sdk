<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>100Prints SDK Vanilla Example</title>
  <style>
    body { font-family: sans-serif; padding: 2rem; max-width: 800px; margin: 0 auto; }
    #preview-box { border: 1px dashed #ccc; min-height: 400px; display: flex; align-items: center; justify-content: center; background: #f9f9f9; margin-top: 1rem; }
    button { padding: 0.5rem 1rem; cursor: pointer; }
    canvas { max-width: 100%; height: auto; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
  </style>
</head>
<body>

  <h1>100Prints Browser SDK</h1>
  <p>This is a minimal example using the SDK via ESM build.</p>

  <div>
    <button id="btn-preview">Generate Preview</button>
    <button id="btn-pdf">Export PDF</button>
  </div>

  <div id="preview-box">
    <span style="color: #888;">Preview will appear here</span>
  </div>

  <script type="module">
    import { BrowserSDK } from '../dist/100prints-sdk.es.js';

    const sdk = new BrowserSDK({
      key: 'pk_live_test_key_replace_me', // Replace with a real key from the backend
      baseUrl: 'http://localhost:8000'
    });

    const templateId = 'replace_with_template_id'; // Replace with real template ID

    const payload = {
      name: 'Jane Doe',
      email: 'jane@example.com'
    };

    document.getElementById('btn-preview').addEventListener('click', async () => {
      const container = document.getElementById('preview-box');
      container.innerHTML = 'Loading...';
      try {
        await sdk.preview({
          templateId,
          payload,
          container
        });
        // Remove the loading text, the canvas was appended
        Array.from(container.childNodes).forEach(node => {
          if (node.nodeType === Node.TEXT_NODE) node.remove();
        });
      } catch (e) {
        container.innerHTML = `<span style="color: red;">Error: ${e.message}</span>`;
      }
    });

    document.getElementById('btn-pdf').addEventListener('click', async () => {
      try {
        const result = await sdk.render({
          templateId,
          payload,
          format: 'pdf',
          quality: 'high'
        });
        
        // Download the blob
        const url = URL.createObjectURL(result.blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'export.pdf';
        a.click();
        URL.revokeObjectURL(url);
      } catch (e) {
        alert('Error: ' + e.message);
      }
    });
  </script>
</body>
</html>
